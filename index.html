<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECharts Force Graph - Network Connections USRN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        
        #main {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .error {
            color: #d32f2f;
            padding: 15px;
            background-color: #ffebee;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>

<div id="main"></div>

<script>
    (async function () {
        try {
            // ===== Configuration =====
            const NODE_REPULSION = 100;
            const EDGE_LENGTH = [50, 150];
            const NODE_SIZE = 15;
            const NODE_SHAPES = ['rect', 'rect', 'rect', 'rect', 'rect', 'rect'];

            // ===== Fetch Data from JSON File =====
            const response = await fetch('data.json');
            if (!response.ok) {
                throw new Error(`Failed to fetch data.json: ${response.statusText}`);
            }
            const data = await response.json();

            // ===== Validate Data Structure =====
            if (!Array.isArray(data.categories) || !Array.isArray(data.nodes) || !Array.isArray(data.links)) {
                throw new Error('Invalid data structure: missing categories, nodes, or links');
            }

            // ===== Process Categories =====
            const categories = data.categories.map(category => ({
                name: category.name,
                itemStyle: {
                    color: category.color
                }
            }));

            // ===== Helper: Create Dual-Color Gradient =====
            function createDualColorSVG(color1, color2) {
                const svg = `
                    <svg viewBox="0 0 30 30" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" style="stop-color:${color1};stop-opacity:1" />
                                <stop offset="100%" style="stop-color:${color2};stop-opacity:1" />
                            </linearGradient>
                        </defs>
                        <rect x="2" y="2" width="26" height="26" fill="url(#grad)" rx="2"/>
                    </svg>
                `;
                return 'data:image/svg+xml;base64,' + btoa(svg);
            }

            // ===== Process Nodes with Dual Colors =====
            const nodes = data.nodes.map(node => {
                const color1 = data.categories[node.category].color;
                const color2 = data.categories[node.category2].color;
                const dualColorImage = createDualColorSVG(color1, color2);

                return {
                    name: node.name,
                    category: node.category,
                    category2: node.category2,
                    symbol: 'image://' + dualColorImage,
                    symbolSize: NODE_SIZE,
                    value: NODE_SIZE,
                    location: node.location,
                    color1: color1,
                    color2: color2
                };
            });

            // ===== Create Node Map for Easy Lookup =====
            const nodeMap = {};
            nodes.forEach(node => {
                nodeMap[node.name] = node;
            });

            // ===== Filter Links: Only Keep Those with Shared Categories =====
            const links = data.links.filter(link => {
                const sourceNode = nodeMap[link.source];
                const targetNode = nodeMap[link.target];
                
                if (!sourceNode || !targetNode) return false;
                
                // Check if nodes share at least one category
                const sourceCategories = [sourceNode.category, sourceNode.category2];
                const targetCategories = [targetNode.category, targetNode.category2];
                
                const hasSharedCategory = sourceCategories.some(cat => targetCategories.includes(cat));
                return hasSharedCategory;
            }).map(link => ({
                source: link.source,
                target: link.target,
                lineStyle: {
                    color: nodeMap[link.source].color1
                }
            }));

            // ===== Initialize Chart =====
            const chartDom = document.getElementById('main');
            const myChart = echarts.init(chartDom);

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        if (params.dataType === 'node') {
                            const categoryName1 = categories[params.data.category]?.name || 'Unknown';
                            const categoryName2 = categories[params.data.category2]?.name || 'Unknown';
                            const location = params.data.location || 'Unknown';
                            return `<b>${params.data.name}</b><br/>Categories: ${categoryName1} & ${categoryName2}<br/>Location: ${location}`;
                        } else if (params.dataType === 'edge') {
                            return `Link: ${params.data.source} → ${params.data.target}`;
                        }
                        return '';
                    }
                },
                legend: [{
                    data: categories.map(c => c.name)
                }],
                series: [{
                    type: 'graph',
                    layout: 'force',
                    roam: true,
                    label: {
                        show: true,
                        position: 'right',
                        fontSize: 10
                    },
                    force: {
                        repulsion: NODE_REPULSION,
                        edgeLength: EDGE_LENGTH
                    },
                    data: nodes,
                    links: links,
                    categories: categories,
                    lineStyle: {
                        curveness: 0
                    }
                }]
            };

            // ===== Set Chart Option =====
            myChart.setOption(option);

            // ===== Handle Window Resize =====
            window.addEventListener('resize', () => {
                myChart.resize();
            });

        } catch (err) {
            console.error('Chart initialization failed:', err);
            const mainDiv = document.getElementById('main');
            mainDiv.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}</div>`;
            mainDiv.style.height = 'auto';
        }
    })();
</script>

</body>
</html>
