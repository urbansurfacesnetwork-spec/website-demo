<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>ECharts Force Graph - Network Connections USRN</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 10px;
        }
        
        #main {
            width: 100%;
            height: 600px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
        }
        
        .error {
            color: #d32f2f;
            padding: 15px;
            background-color: #ffebee;
            border-radius: 4px;
            margin-bottom: 15px;
        }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
</head>
<body>

<div id="main"></div>

<script>
    (async function () {
        try {
            // ===== Configuration =====
            const NODE_REPULSION = 100;
            const EDGE_LENGTH = [50, 150];
            const NODE_SIZE = 15;
            const NODE_SHAPES = ['rect', 'rect', 'rect', 'rect', 'rect', 'rect'];

            // ===== Fetch Data from JSON File =====
            const response = await fetch('data.json');
            if (!response.ok) {
                throw new Error(`Failed to fetch data.json: ${response.statusText}`);
            }
            const data = await response.json();

            // ===== Validate Data Structure =====
            if (!Array.isArray(data.categories) || !Array.isArray(data.nodes) || !Array.isArray(data.links)) {
                throw new Error('Invalid data structure: missing categories, nodes, or links');
            }

            // ===== Process Categories =====
            const categories = data.categories.map(category => ({
                name: category.name,
                itemStyle: {
                    color: category.color
                }
            }));

            // ===== Process Nodes (Uniform Size) =====
            const nodes = data.nodes.map(node => ({
                name: node.name,
                category: node.category,
                symbol: NODE_SHAPES[Math.floor(Math.random() * NODE_SHAPES.length)],
                symbolSize: NODE_SIZE,
                value: NODE_SIZE,
                location: node.location
            }));

            // ===== Create Node Color Map =====
            const nodeColorMap = {};
            nodes.forEach(node => {
                nodeColorMap[node.name] = data.categories[node.category].color;
            });

            // ===== Process Links with Category-Based Colors =====
            const links = data.links.map(link => ({
                source: link.source,
                target: link.target,
                lineStyle: {
                    color: nodeColorMap[link.source]
                }
            }));

            // ===== Initialize Chart =====
            const chartDom = document.getElementById('main');
            const myChart = echarts.init(chartDom);

            const option = {
                tooltip: {
                    trigger: 'item',
                    formatter: function (params) {
                        if (params.dataType === 'node') {
                            const categoryName = categories[params.data.category]?.name || 'Unknown';
                            const location = params.data.location || 'Unknown';
                            return `<b>${params.data.name}</b><br/>Category: ${categoryName}<br/>Location: ${location}`;
                        } else if (params.dataType === 'edge') {
                            return `Link: ${params.data.source} → ${params.data.target}`;
                        }
                        return '';
                    }
                },
                legend: [{
                    data: categories.map(c => c.name)
                }],
                series: [{
                    type: 'graph',
                    layout: 'force',
                    roam: true,
                    label: {
                        show: true,
                        position: 'right',
                        fontSize: 10
                    },
                    force: {
                        repulsion: NODE_REPULSION,
                        edgeLength: EDGE_LENGTH
                    },
                    data: nodes,
                    links: links,
                    categories: categories,
                    lineStyle: {
                        curveness: 0
                    }
                }]
            };

            // ===== Set Chart Option =====
            myChart.setOption(option);

            // ===== Handle Window Resize =====
            window.addEventListener('resize', () => {
                myChart.resize();
            });

        } catch (err) {
            console.error('Chart initialization failed:', err);
            const mainDiv = document.getElementById('main');
            mainDiv.innerHTML = `<div class="error"><strong>Error:</strong> ${err.message}</div>`;
            mainDiv.style.height = 'auto';
        }
    })();
</script>

</body>
</html>
